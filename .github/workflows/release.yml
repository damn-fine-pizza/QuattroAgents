name: Release

on:
  workflow_dispatch:
    inputs:
      build:
        description: Numeric build identifier shown in the release name
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }} build ${{ inputs.build }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install --upgrade pip
      - run: .venv/bin/python -m pip install ".[dev]"
      - name: Verify release inputs and checked-out tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
          RELEASE_BUILD: ${{ inputs.build }}
        run: |
          case "$RELEASE_BUILD" in
            ''|*[!0-9]*) echo "build must be numeric" >&2; exit 1 ;;
          esac
          test "$RELEASE_REF_TYPE" = "tag" || { echo "workflow must be run from a tag, not a branch" >&2; exit 1; }
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD FETCH_HEAD
          .venv/bin/python - "$RELEASE_TAG" <<'PY'
          from importlib.metadata import version
          import sys

          actual = version("quattroagents")
          expected_tag = f"v{actual}"
          if sys.argv[1] != expected_tag:
              raise SystemExit(
                  f"tag {sys.argv[1]} does not match the canonical version tag {expected_tag}"
              )
          PY
      - run: .venv/bin/python -m pytest
      - run: .venv/bin/python -m ruff check .
      - run: .venv/bin/python -m ruff format --check .
      - run: .venv/bin/python -m mypy src
      - run: .venv/bin/python -m quattroagents validate --format json
      - run: .venv/bin/python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: quattroagents-${{ github.ref_name }}-build-${{ inputs.build }}
          path: dist/
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} build ${{ inputs.build }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
